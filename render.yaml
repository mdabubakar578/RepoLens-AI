services:
  - type: web
    name: repolens-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
